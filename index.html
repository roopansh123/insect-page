<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insect</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link href="./style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="page">
      <div class="left">
        <nav class="left-nav">
          <span class="logo">INSECT</span>
          <div class="search-bar">
            <svg viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="7" />
              <line x1="16.5" y1="16.5" x2="22" y2="22" />
            </svg>
            <input type="text" placeholder="Search..." />
          </div>
        </nav>

        <div class="classification-wrap">
          <span class="vertical-label">Classification</span>
          <ul class="classification-list">
            <li>
              <span class="c-bullet"></span
              ><span class="c-text"
                ><span class="c-label">Class:</span
                ><span class="c-value">Insecta</span></span
              >
            </li>
            <li>
              <span class="c-bullet"></span
              ><span class="c-text"
                ><span class="c-label">Order:</span
                ><span class="c-value">Coleoptera</span></span
              >
            </li>
            <li>
              <span class="c-bullet"></span
              ><span class="c-text"
                ><span class="c-label">Family:</span
                ><span class="c-value">Cerambycidae</span></span
              >
            </li>
            <li>
              <span class="c-bullet"></span
              ><span class="c-text"
                ><span class="c-label">Sub-Family:</span
                ><span class="c-value">Cerambycinae</span></span
              >
            </li>
            <li>
              <span class="c-bullet"></span
              ><span class="c-text"
                ><span class="c-label">Tribe:</span
                ><span class="c-value">Callicromatini</span></span
              >
            </li>
            <li>
              <span class="c-bullet"></span
              ><span class="c-text"
                ><span class="c-label">Genus:</span
                ><span class="c-value">Pachyteria</span></span
              >
            </li>
          </ul>
        </div>
      </div>

      <div class="dome-wrap">
        <img
          src="./Assets/img.png"
          alt="Pachyteria equestris under glass dome"
        />
      </div>

      <div class="right">
        <nav class="right-nav">
          <a href="#">Home</a>
          <a href="#">Shop</a>
          <a href="#">About</a>
          <a href="#">Gallery</a>
          <a href="#">Contact</a>
        </nav>

        <div class="product-detail">
          <h1 class="species-name">Pachyteria<br />equestris</h1>

          <div class="specs-row">
            <div class="spec-icon-block">
              <svg viewBox="0 0 60 70" aria-hidden="true">
                <ellipse cx="30" cy="13" rx="6" ry="7" />
                <ellipse cx="30" cy="30" rx="10" ry="13" />
                <ellipse cx="30" cy="48" rx="9" ry="11" />
                <line x1="26" y1="8" x2="17" y2="1" />
                <line x1="34" y1="8" x2="43" y2="1" />
                <line x1="21" y1="27" x2="7" y2="23" />
                <line x1="21" y1="33" x2="6" y2="33" />
                <line x1="22" y1="43" x2="8" y2="51" />
                <line x1="39" y1="27" x2="53" y2="23" />
                <line x1="39" y1="33" x2="54" y2="33" />
                <line x1="38" y1="43" x2="52" y2="51" />
              </svg>
              <span class="spec-size-label">32 mm</span>
            </div>

            <div class="spec-list">
              <div class="spec-item">
                <svg viewBox="0 0 24 24">
                  <path
                    d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"
                  />
                  <circle cx="12" cy="9" r="2.5" />
                </svg>
                <span class="spec-info">
                  <span class="spec-key">Locality</span>
                  <span class="spec-val">Malaysia</span>
                </span>
              </div>
              <div class="spec-item">
                <svg viewBox="0 0 24 24">
                  <circle cx="11" cy="11" r="5" />
                  <line x1="15.5" y1="6.5" x2="21" y2="1" />
                  <polyline points="17 1 21 1 21 5" />
                </svg>
                <span class="spec-info">
                  <span class="spec-key">Sex</span>
                  <span class="spec-val">Male</span>
                </span>
              </div>
              <div class="spec-item">
                <svg viewBox="0 0 24 24">
                  <rect x="2" y="8" width="20" height="8" rx="1" />
                  <line x1="6" y1="8" x2="6" y2="12" />
                  <line x1="10" y1="8" x2="10" y2="11" />
                  <line x1="14" y1="8" x2="14" y2="12" />
                  <line x1="18" y1="8" x2="18" y2="11" />
                </svg>
                <span class="spec-info">
                  <span class="spec-key">Size</span>
                  <span class="spec-val">32 mm / 12 mm</span>
                </span>
              </div>
            </div>
          </div>

          <div class="price">$5.99</div>

          <div class="toggles">
            <label class="toggle-row">
              <span class="toggle-switch"
                ><input type="checkbox" /><span class="toggle-track"></span
              ></span>
              <span class="toggle-label">View detailed antennae</span>
            </label>
            <label class="toggle-row">
              <span class="toggle-switch"
                ><input type="checkbox" /><span class="toggle-track"></span
              ></span>
              <span class="toggle-label">View underside</span>
            </label>
          </div>

          <button class="cta-btn">Add to collection</button>
        </div>
      </div>
    </div>
  </body>
</html>
